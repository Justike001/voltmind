name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: voltmind-darwin-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: voltmind-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: voltmind-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - name: Run full test suite on Unix release builders
        if: matrix.os != 'windows-latest'
        run: bun test
      - name: Run Windows Autopilot adapter tests
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >-
          bun test
          test/autopilot-cycle-handler.test.ts
          test/autopilot-install.test.ts
          test/autopilot-reconnect-classifier.test.ts
          test/autopilot-cli-invocation.test.ts
          test/autopilot-detect-target.test.ts
          test/autopilot-diagnostics.test.ts
          test/autopilot-env-file.test.ts
          test/autopilot-heartbeat-wiring.test.ts
          test/autopilot-lock-cleanup.test.ts
          test/autopilot-manifest.test.ts
          test/autopilot-pause-control.test.ts
          test/autopilot-runtime-status.test.ts
          test/autopilot-verify-once-wiring.test.ts
          test/autopilot-windows-task-xml.test.ts
      - run: bun build --compile --target=${{ matrix.target }} --outfile bin/${{ matrix.artifact }} src/cli.ts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: |
            artifacts/voltmind-darwin-arm64/voltmind-darwin-arm64
            artifacts/voltmind-linux-x64/voltmind-linux-x64
            artifacts/voltmind-windows-x64.exe/voltmind-windows-x64.exe
          generate_release_notes: true
