# voltmind-company-core — shared company brain foundation.
#
# This pack is the Company Core layer for VoltMind. It keeps the universal
# person/company/page primitives from voltmind-base, then adds the shared
# operating objects every department can use before department lenses are
# installed.
#
# Design notes:
# - `orgs/` is one namespace for teams/org units. Roles live as frontmatter
#   fields on people and org pages during MVP, not as `orgs/roles/` pages.
# - `state/` holds derived operational objects. Decisions, commitments,
#   actions, and risks live under state/* instead of root directories.
# - Department-specific surfaces such as incidents, accounts, contracts,
#   features, experiments, and campaigns belong in lens packs that extend this.
# - `ontology/core.yaml` and `ontology/lenses/` are control-plane files; the
#   ontology page type lets them be indexed without turning them into business
#   entities.

api_version: voltmind-schema-pack-v1
name: voltmind-company-core
version: 0.1.0
voltmind_min_version: 0.42.0
extends: voltmind-base
description: "Company Core schema pack for a shared organizational brain. Provides the common object model across departments: people, org units, companies, workstreams, projects, ideas, meetings, artifacts, policies, sources, daily logs, contribution candidates, private notes, and derived state objects for decisions, commitments, actions, and risks. Department lenses should extend this pack rather than redefining company-wide primitives."

page_types:
  - name: ontology
    primitive: annotation
    path_prefixes:
      - ontology/
    aliases: []
    extractable: false
    expert_routing: false

  - name: org
    primitive: entity
    path_prefixes:
      - orgs/
    aliases:
      - team
      - department
      - function
    extractable: true
    expert_routing: false

  - name: project
    primitive: entity
    path_prefixes:
      - projects/
    aliases:
      - initiative
    extractable: true
    expert_routing: false

  - name: workstream
    primitive: entity
    path_prefixes:
      - workstreams/
    aliases:
      - responsibility-domain
      - long-running-work
    extractable: true
    expert_routing: false

  - name: idea
    primitive: concept
    path_prefixes:
      - ideas/
    aliases:
      - thesis
      - bet
      - observation
      - product-thought
    extractable: true
    expert_routing: false

  - name: meeting
    primitive: temporal
    path_prefixes:
      - meetings/
    aliases:
      - discussion
      - sync
    extractable: true
    expert_routing: false

  - name: decision
    primitive: temporal
    path_prefixes:
      - state/decisions/
    aliases:
      - decision-record
      - adr
    extractable: true
    expert_routing: false

  - name: commitment
    primitive: temporal
    path_prefixes:
      - state/commitments/
    aliases:
      - promise
      - obligation
    extractable: true
    expert_routing: false

  - name: action
    primitive: temporal
    path_prefixes:
      - state/actions/
    aliases:
      - task
      - todo
      - follow-up
      - manual_action
      - agent_assisted_action
      - agent_executable_action
      - agent_scheduled_action
      - agent_watch_action
    extractable: true
    expert_routing: false

  - name: risk
    primitive: temporal
    path_prefixes:
      - state/risks/
    aliases:
      - blocker
      - concern
    extractable: true
    expert_routing: false

  - name: policy
    primitive: media
    path_prefixes:
      - policy/
    aliases:
      - process
      - standard
      - sop
    extractable: true
    expert_routing: false

  - name: artifact
    primitive: media
    path_prefixes:
      - artifacts/
    aliases:
      - deliverable
      - proposal
      - report
      - design-doc
    extractable: true
    expert_routing: false

  - name: source
    primitive: media
    path_prefixes:
      - sources/
    aliases: []
    extractable: true
    expert_routing: false

  - name: daily
    primitive: temporal
    path_prefixes:
      - daily/
    aliases:
      - daily-log
      - operating-log
    extractable: true
    expert_routing: false

  - name: contribution_candidate
    primitive: annotation
    path_prefixes:
      - contribution/candidates/
    aliases:
      - publish-candidate
      - contribution
    extractable: false
    expert_routing: false

  - name: private
    primitive: annotation
    path_prefixes:
      - private/
    aliases: []
    extractable: false
    expert_routing: false

  - name: inbox
    primitive: annotation
    path_prefixes:
      - inbox/
    aliases:
      - quick-capture
    extractable: false
    expert_routing: false

